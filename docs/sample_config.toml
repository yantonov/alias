executable="/usr/bin/git"

[alias]
# regular alias: expands to arguments passed to the target program
co = "checkout"
st = "status"

# shell alias: prefixed with !, executed by the current shell
ls = "!ls -la"

# one-level group: accessed as `git docker ps`
[alias.docker]
ps  = "container ls"
rmi = "image rm"

# nested groups: accessed as `git docker container ls`, `git docker image build`
[alias.docker.container]
ls    = "container ls"
clean = "!docker container prune -f"

[alias.docker.image]
build = "image build -t"
ls    = "image ls"
